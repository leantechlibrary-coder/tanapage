<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>棚主管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F5F0; --ink:#26241F; --ink-soft:#6E6A60;
  --accent:#1F4E79; --accent-pale:#E8EDF3;
  --hairline:#DCD9D0; --card:#FFFFFF;
  --ok:#3D7A4E; --warn:#A8552F;
  --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--ink);font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;line-height:1.9;letter-spacing:.02em}
.wrap{max-width:560px;margin:0 auto;padding:0 22px 120px}
header{padding:44px 0 10px}
.tag{font-family:var(--mono);font-size:11px;letter-spacing:.28em;color:var(--accent);margin-bottom:10px}
h1{font-size:24px;font-weight:700;letter-spacing:.06em;line-height:1.5}
.sub{margin-top:6px;font-size:13px;color:var(--ink-soft)}

/* ---- フォーム ---- */
.panel{margin-top:26px;padding:24px 22px;background:var(--card);border:1px solid var(--hairline)}
.panel h2{font-size:14px;font-weight:700;letter-spacing:.16em;margin-bottom:14px}
.panel p.help{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--ink-soft);letter-spacing:.08em;margin-bottom:6px}
.field input{width:100%;font-family:inherit;font-size:15px;padding:11px 12px;border:1px solid var(--hairline);background:var(--paper);border-radius:0}
.field input:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.primary{font-family:inherit;font-size:13.5px;letter-spacing:.14em;color:#fff;background:var(--accent);border:1.5px solid var(--accent);padding:11px 30px;cursor:pointer}
.primary:disabled{opacity:.5;cursor:default}
.primary:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
.linkish{font-size:12.5px;color:var(--ink-soft);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.msg{margin-top:14px;font-size:13px;color:var(--warn)}
.msg.ok{color:var(--ok)}

/* ---- 管理画面 ---- */
.section-head{display:flex;justify-content:space-between;align-items:baseline;margin:40px 0 4px;padding-bottom:10px;border-bottom:2px solid var(--ink)}
.section-head h2{font-size:15px;font-weight:700;letter-spacing:.18em}
.section-head span{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
.empty{padding:22px 2px;font-size:13px;color:var(--ink-soft)}

.report{border-bottom:1px solid var(--hairline);padding:18px 2px}
.report .book-title{font-size:16px;font-weight:500}
.report .meta{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-top:2px}
.report .held{display:inline-block;font-size:11px;color:var(--warn);border:1px solid var(--warn);padding:1px 8px;margin-left:8px;vertical-align:1px}
.report .comment{margin:10px 0 4px;padding:12px 14px;background:var(--accent-pale);font-size:13.5px}
.report .comment b{display:block;font-size:10.5px;letter-spacing:.22em;color:var(--accent);margin-bottom:2px}
.report .actions{display:flex;gap:12px;margin-top:12px;align-items:center}
.approve-btn{font-family:inherit;font-size:13px;letter-spacing:.1em;color:#fff;background:var(--ok);border:1.5px solid var(--ok);padding:8px 24px;cursor:pointer}
.reject-btn{font-family:inherit;font-size:12.5px;color:var(--ink-soft);background:none;border:1px solid var(--hairline);padding:8px 18px;cursor:pointer}
.approve-btn:disabled,.reject-btn:disabled{opacity:.5;cursor:default}
.approve-btn:focus-visible,.reject-btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.hint-approve{font-size:12px;color:var(--ink-soft);margin-top:6px}

.stock{border-bottom:1px solid var(--hairline);padding:14px 2px;display:grid;grid-template-columns:1fr auto;gap:2px 12px;align-items:baseline}
.stock .t{font-size:15px;font-weight:500}
.stock .m{font-family:var(--mono);font-size:11px;color:var(--ink-soft);grid-column:1}
.badge{font-family:var(--mono);font-size:11px;letter-spacing:.1em;padding:2px 10px;border:1px solid var(--hairline);color:var(--ink-soft);white-space:nowrap}
.badge.on{color:var(--accent);border-color:var(--accent)}
.badge.sold{color:var(--ok);border-color:var(--ok)}

.toolbar{display:flex;gap:16px;align-items:center;margin-top:34px}
.state{padding:64px 0;text-align:center;color:var(--ink-soft);font-size:13px;letter-spacing:.1em}
footer{margin-top:64px;padding-top:24px;border-top:1px solid var(--hairline);font-size:12px;color:var(--ink-soft)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="tag">SHELF ADMIN</div>
    <h1>棚主管理</h1>
    <p class="sub" id="shelfLabel"></p>
  </header>

  <!-- ============ ログイン ============ -->
  <section id="loginView" hidden>
    <div class="panel">
      <h2>棚キーでひらく</h2>
      <form id="loginForm">
        <div class="field">
          <label for="loginShelf">棚ID</label>
          <input id="loginShelf" name="username" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="loginKey">棚キー</label>
          <input id="loginKey" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="primary" id="loginBtn">ひらく</button>
        <div class="msg" id="loginMsg" role="alert"></div>
      </form>
    </div>
    <p style="margin-top:14px;font-size:12.5px;color:var(--ink-soft)">
      棚キーを忘れたときは運営者に連絡してください（リセット後にここで再設定できます）。
    </p>
  </section>

  <!-- ============ 棚キー初回設定 ============ -->
  <section id="setupView" hidden>
    <div class="panel">
      <h2>棚キーの設定</h2>
      <p class="help">この棚にはまだ棚キーがありません。合言葉を決めてください（8文字以上）。パスワード管理アプリでの生成・保存をおすすめします。</p>
      <form id="setupForm">
        <div class="field">
          <label for="setupShelf">棚ID</label>
          <input id="setupShelf" name="username" autocomplete="username" readonly>
        </div>
        <div class="field">
          <label for="setupKey">新しい棚キー</label>
          <input id="setupKey" name="new-password" type="password" autocomplete="new-password" minlength="8" required>
        </div>
        <div class="field">
          <label for="setupKey2">もう一度</label>
          <input id="setupKey2" type="password" autocomplete="new-password" minlength="8" required>
        </div>
        <button class="primary" id="setupBtn">設定してひらく</button>
        <div class="msg" id="setupMsg" role="alert"></div>
      </form>
    </div>
  </section>

  <!-- ============ 管理画面 ============ -->
  <section id="adminView" hidden>
    <div class="section-head">
      <h2>購入報告</h2>
      <span id="reportCount"></span>
    </div>
    <div id="reports"></div>

    <div class="section-head">
      <h2>在庫</h2>
      <span id="stockCount"></span>
    </div>
    <div id="stocks"></div>

    <div class="toolbar">
      <button class="primary" id="reloadBtn">再読み込み</button>
      <button class="linkish" id="logoutBtn">とじる（ログアウト）</button>
    </div>
    <div class="msg" id="adminMsg" role="alert"></div>

    <footer>
      <p>承認すると本は「販売済」になり、棚ページから消えます。在庫の追加・編集は今はスプレッドシートで行ってください（次スライスでここに来ます）。</p>
    </footer>
  </section>

  <div class="state" id="state" hidden></div>
</div>

<script>
/* ================= 設定 =================
 * GAS_URL は棚ページ(index.html)と同じものを貼る。
 * 棚IDはURLの ?s= で指定（例: admin.html?s=shelf-2f）。
 */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwNscZF8AA7jdXtEJEVetS06oxWxCxKU_9ju36oH62_0VHDDPq4RyUXUhKSNZGkbiTUhg/exec';

const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const urlShelf = new URLSearchParams(location.search).get('s') || '';
let shelfId = urlShelf;
let shelfKey = '';          // メモリ内のみ。保存はパスワードマネージャに任せる
let adminData = null;

async function api(body) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },   // CORSプリフライト回避
    body: JSON.stringify(body),
  });
  return res.json();
}

/* ============ ログイン ============ */
$('loginShelf').value = urlShelf;
$('shelfLabel').textContent = urlShelf ? `棚ID: ${urlShelf}` : '';

$('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = $('loginBtn');
  btn.disabled = true;
  $('loginMsg').textContent = '';
  shelfId = $('loginShelf').value.trim();
  shelfKey = $('loginKey').value;
  let r;
  try { r = await api({ action:'getAdmin', shelfId, key: shelfKey }); }
  catch (err) { r = { ok:false, error:'network' }; }
  btn.disabled = false;

  if (r.ok) {
    adminData = r.data;
    showAdmin();
    return;
  }
  if (r.error === 'no_key') {           // 未設定 → 初回設定へ
    $('setupShelf').value = shelfId;
    $('loginView').hidden = true;
    $('setupView').hidden = false;
    $('setupKey').focus();
    return;
  }
  $('loginMsg').textContent = ({
    'auth': '棚キーが違います。',
    'shelf not found': 'この棚IDは見つかりませんでした。',
    'unknown action': 'GAS側が古いままです。Code.gs を更新して「新バージョン」でデプロイしてください。',
    'network': '通信できませんでした。電波のよいところでもう一度どうぞ。',
  })[r.error] || `エラー: ${r.error}`;
});

/* ============ 棚キー初回設定 ============ */
$('setupForm').addEventListener('submit', async e => {
  e.preventDefault();
  const k1 = $('setupKey').value, k2 = $('setupKey2').value;
  if (k1 !== k2) { $('setupMsg').textContent = '2つの入力が一致しません。'; return; }
  const btn = $('setupBtn');
  btn.disabled = true;
  $('setupMsg').textContent = '';
  let r;
  try { r = await api({ action:'setKey', shelfId, newKey: k1 }); }
  catch (err) { r = { ok:false, error:'network' }; }

  if (!r.ok) {
    btn.disabled = false;
    $('setupMsg').textContent = ({
      'key too short': '棚キーは8文字以上にしてください。',
      'key already set': 'すでに棚キーが設定されています。ログインからどうぞ。',
      'network': '通信できませんでした。もう一度お試しください。',
    })[r.error] || `エラー: ${r.error}`;
    return;
  }
  shelfKey = k1;
  const r2 = await api({ action:'getAdmin', shelfId, key: shelfKey });
  btn.disabled = false;
  if (r2.ok) { adminData = r2.data; showAdmin(); }
  else { $('setupMsg').textContent = '設定はできましたが読み込みに失敗しました。ログインし直してください。'; }
});

/* ============ 管理画面 ============ */
function showAdmin() {
  $('loginView').hidden = true;
  $('setupView').hidden = true;
  $('adminView').hidden = false;
  $('shelfLabel').textContent = `棚ID: ${shelfId}`;
  render();
}

function fmtDate(v) {
  const d = new Date(v);
  if (isNaN(d)) return '';
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function render() {
  const { books, reports } = adminData;
  const byId = Object.fromEntries(books.map(b => [b.id, b]));

  // ---- 報告キュー ----
  const rl = $('reports');
  rl.innerHTML = '';
  $('reportCount').textContent = `${reports.length} 件`;
  if (!reports.length) {
    rl.innerHTML = '<div class="empty">いま届いている報告はありません。</div>';
  }
  reports.forEach(rep => {
    const book = byId[rep.bookId];
    const d = document.createElement('div');
    d.className = 'report';
    d.innerHTML = `
      <div class="book-title">${esc(book ? book.title : rep.bookId)}${rep.status === 'held' ? '<span class="held">URLを含むため保留</span>' : ''}</div>
      <div class="meta">${esc(fmtDate(rep.at))}　·　${esc(book ? book.author : '')}　·　¥${book ? Number(book.price).toLocaleString() : '?'}</div>
      ${rep.comment ? `<div class="comment"><b>購入者のひとこと</b>${esc(rep.comment)}</div>` : ''}
      <div class="actions">
        <button class="approve-btn">承認して販売済にする</button>
        <button class="reject-btn">却下</button>
      </div>
      <div class="hint-approve">棚の現物がなくなっていることを確認してから承認してください。</div>`;
    d.querySelector('.approve-btn').addEventListener('click',
      () => act(d, 'approveReport', rep.id));
    d.querySelector('.reject-btn').addEventListener('click', () => {
      if (confirm('この報告を却下しますか？（本は棚に残ります）')) act(d, 'rejectReport', rep.id);
    });
    rl.appendChild(d);
  });

  // ---- 在庫 ----
  const STATUS = {
    on_shelf: ['棚にあります', 'on'],
    sold: ['販売済', 'sold'],
    removed: ['撤去', ''],
  };
  const sl = $('stocks');
  sl.innerHTML = '';
  const shown = books.filter(b => b.status !== 'removed');
  $('stockCount').textContent = `${shown.filter(b => b.status === 'on_shelf').length} 冊 陳列中`;
  shown.forEach(b => {
    const [label, cls] = STATUS[b.status] || [b.status, ''];
    const d = document.createElement('div');
    d.className = 'stock';
    d.innerHTML = `
      <div class="t">${esc(b.title)}</div>
      <span class="badge ${cls}">${label}</span>
      <div class="m">${esc(b.author)}　·　¥${Number(b.price).toLocaleString()}${b.status === 'sold' && b.soldAt ? '　·　' + esc(fmtDate(b.soldAt)) : ''}</div>`;
    sl.appendChild(d);
  });
}

async function act(el, action, reportId) {
  el.querySelectorAll('button').forEach(b => b.disabled = true);
  $('adminMsg').textContent = '';
  let r;
  try { r = await api({ action, shelfId, key: shelfKey, reportId }); }
  catch (err) { r = { ok:false, error:'network' }; }
  if (!r.ok) {
    el.querySelectorAll('button').forEach(b => b.disabled = false);
    $('adminMsg').textContent = r.error === 'network'
      ? '通信できませんでした。もう一度お試しください。'
      : `エラー: ${r.error}`;
    return;
  }
  await refresh();
}

async function refresh() {
  let r;
  try { r = await api({ action:'getAdmin', shelfId, key: shelfKey }); }
  catch (err) { r = { ok:false } }
  if (r.ok) { adminData = r.data; render(); }
  else $('adminMsg').textContent = '再読み込みに失敗しました。';
}

$('reloadBtn').addEventListener('click', refresh);
$('logoutBtn').addEventListener('click', () => location.reload());

/* ============ 起動時: 棚キーが未設定なら最初から設定画面を出す ============ */
async function boot() {
  if (!GAS_URL) {
    $('state').hidden = false;
    $('state').textContent = 'GAS_URL が未設定です。index.html と同じURLを設定してください。';
    return;
  }
  if (!urlShelf) {           // 棚IDが不明なら判定できないのでログインへ
    $('loginView').hidden = false;
    return;
  }
  $('state').hidden = false;
  $('state').textContent = '棚の状態をしらべています…';
  let r;
  try { r = await api({ action:'getAdmin', shelfId: urlShelf, key:'' }); }
  catch (err) { r = { ok:false, error:'network' } }
  $('state').hidden = true;

  if (r.error === 'no_key') {              // 未設定 → 初回設定画面へ直行
    $('setupShelf').value = urlShelf;
    $('setupView').hidden = false;
    return;
  }
  $('loginView').hidden = false;
  if (r.error === 'unknown action') {
    $('loginMsg').textContent = 'GAS側が古いままです。Code.gs を貼り替えて「新バージョン」でデプロイしてください。';
  } else if (r.error === 'network') {
    $('loginMsg').textContent = '通信できませんでした。再読み込みしてください。';
  }
}
boot();
</script>
</body>
</html>
